<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BG Alignment Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
canvas { display:block; image-rendering:pixelated; }
#info { color:#fff; font-family:monospace; font-size:13px; margin-top:8px; text-align:center; line-height:1.8; }
#controls { color:#aaa; font-family:monospace; font-size:11px; margin-top:6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Loading…</div>
<div id="controls">
  Frame 2 offset: <input id="dx2" type="number" value="0" style="width:60px"> x &nbsp;
  <input id="dy2" type="number" value="0" style="width:60px"> y &nbsp;&nbsp;|&nbsp;&nbsp;
  Frame 3 offset: <input id="dx3" type="number" value="0" style="width:60px"> x &nbsp;
  <input id="dy3" type="number" value="0" style="width:60px"> y &nbsp;&nbsp;
  <button onclick="applyOffsets()">Apply</button>
</div>

<script>
const W = 832, H = 1248;
const canvas = document.getElementById('c');
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

const imgs = [1, 2].map(i => {
  const img = new Image();
  img.src = `animations/background/background ${i}.jpg`;
  return img;
});

// Per-frame draw offsets vs frame 1 (frame 1 is always 0,0)
const offsets = [
  { dx: 0, dy:  0 },
  { dx: 0, dy: -5 },
];

let frameIdx = 0;
let flickering = true;

function draw() {
  const img = imgs[frameIdx];
  const off = offsets[frameIdx];
  if (!img.complete || !img.naturalWidth) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    return;
  }
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(img, off.dx, off.dy, W, H);
}

function tick() {
  if (flickering) {
    frameIdx = (frameIdx + 1) % 3;
    draw();
    document.getElementById('info').textContent =
      `Showing frame ${frameIdx + 1}  |  offset dx=${offsets[frameIdx].dx} dy=${offsets[frameIdx].dy}` +
      `\nFlickering rapidly — watch for stutter/jump to identify misalignment`;
  }
}

setInterval(tick, 800);

Promise.all(imgs.map(img => new Promise(r => { img.onload = r; img.onerror = r; }))).then(() => {
  draw();
  document.getElementById('info').textContent =
    'All 3 frames loaded. Watch for stutter — adjust offsets below to fix alignment.';
});

function applyOffsets() {
  offsets[1].dx = parseInt(document.getElementById('dx2').value) || 0;
  offsets[1].dy = parseInt(document.getElementById('dy2').value) || 0;
  offsets[2].dx = parseInt(document.getElementById('dx3').value) || 0;
  offsets[2].dy = parseInt(document.getElementById('dy3').value) || 0;
  draw();
  document.getElementById('info').textContent =
    `Offsets applied — Frame2(${offsets[1].dx},${offsets[1].dy})  Frame3(${offsets[2].dx},${offsets[2].dy})`;
}
</script>
</body>
</html>
